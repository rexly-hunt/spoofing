<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech + Delayed Redirect</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding: 50px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>
<button id="speechBtn">CLICK CALL CENTER GOOGLE</button>

<script>
const btn = document.getElementById('speechBtn');
const text = "Hello, google.com is still experiencing an error or maintenance. Please visit the support center or call our call center at plus five two";

// Fungsi tunggu voices (penting untuk Firefox)
function waitForVoices() {
  return new Promise((resolve) => {
    let voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      resolve(voices);
    } else {
      speechSynthesis.onvoiceschanged = () => {
        resolve(speechSynthesis.getVoices());
      };
      setTimeout(() => resolve([]), 1000);
    }
  });
}

btn.addEventListener('click', async () => {
  
  // Cek dan jalankan speech
  if ('speechSynthesis' in window) {
    const voices = await waitForVoices();
    
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    
    if (voices.length > 0) {
      const enVoice = voices.find(v => v.lang.startsWith('en'));
      if (enVoice) utter.voice = enVoice;
    }
    
    speechSynthesis.speak(utter);
  }
  
  // Redirect setelah 1.5 detik
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 500);
  
});
</script>

</body>
</html>
